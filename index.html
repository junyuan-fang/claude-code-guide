# Claude Code 多代理能力可视化指南

> 一份面向「自定义 Subagents / Agent View / 代理团队 / 动态工作流 / Worktree 隔离」的图解笔记。
> 所有流程图用 [Mermaid](https://mermaid.js.org/) 绘制,在支持 Mermaid 的 Markdown 阅读器(VS Code 插件、Obsidian、GitHub 等)里可直接渲染。

### ⏱️ 30 秒速览

| 概念 | 一句话 | 类比 |
|------|--------|------|
| **默认主会话** | 你直接对话、上下文连续的那个 Claude | 你本人 / 项目负责人 |
| **Subagent** | 一次性下属,干完一件活交摘要就走 | 临时叫来的专员 |
| **Agent View** | 管理多个后台会话的看板 | 任务监控大屏 |
| **Agent Teams** | 能互相通信的对等同事 | 一支并行小队 |
| **Dynamic Workflow** | 脚本编排几十上百个 agent | 流水线 / 工厂 |
| **Worktree** | 文件级隔离,让并行会话不打架 | 每人一份独立工作副本 |

> 💡 **不知道用哪个?** 直接看 [§0 的决策图](#)。一次性小活用 **Subagent**;要讨论协作用 **Teams**;同类任务几十上百个用 **Workflow**;多个会话改同一份代码先上 **Worktree**。

---

## 0. 全景:五种「让 Claude 干更多活」的方式

Claude Code 把「单会话单 Claude」扩展成多代理协作,核心有四种机制 + 一种隔离基建。先建立全局心智模型:

```mermaid
mindmap
  root((Claude Code<br/>多代理))
    Subagents
      新鲜上下文的 worker
      Claude 逐轮决定
      工具/模型可裁剪
      单会话内并行
    Agent View
      管理多个后台会话
      监控/介入/分派
      命令: claude agents
    Agent Teams
      多个对等会话
      队员之间直接通信
      共享任务清单
    Dynamic Workflows
      JS 脚本编排
      运行时后台执行
      几十到几百 agent
    Worktrees
      文件级隔离基建
      并行会话不打架
      上面四种都依赖它
```

### 怎么选?一张决策图

```mermaid
flowchart TD
    A[我要做什么?] --> B{任务规模?}
    B -->|单个子任务<br/>需要干净上下文| C[Subagent]
    B -->|几个长期并行任务<br/>需要实时讨论协作| D[Agent Teams]
    B -->|几十到几百个同类任务<br/>可脚本化编排| E[Dynamic Workflow]
    A --> F{我只是想<br/>看/管已在跑的活?} 
    F -->|是| G[Agent View]
    A --> H{多个会话<br/>会改同一份代码?}
    H -->|是| I[用 Worktrees 隔离]

    style C fill:#cfe8ff
    style D fill:#ffe7cf
    style E fill:#d8f5d0
    style G fill:#f5d0e8
    style I fill:#fff3c4
```

### 四种机制的本质对比

| 维度 | Subagents | Agent Teams | Dynamic Workflows | Agent View |
|------|-----------|-------------|-------------------|------------|
| 是什么 | 生成的 worker | lead 主管的对等会话 | 运行时执行的脚本 | 管理多会话的 UI |
| **谁决定下一步** | Claude 逐轮 | 队长逐轮 | **脚本** | 用户 |
| 中间结果存哪 | Claude 上下文 | 共享任务清单 | **脚本变量** | 各会话自身 |
| 通信方式 | 只向上汇报 | **队员间 P2P** | 脚本协调 | — |
| 规模 | 几个/轮 | 几个长跑对等体 | **几十到几百** | 任意多个 |
| 隔离 | 上下文隔离 | worktree | worktree | worktree |

## 1. 创建自定义 Subagents

### 先分清:主会话 vs Subagent vs Teammate

这三个最容易混。一句话:**主会话是「你」,subagent 是你派的一次性下属,teammate 是和你对等的同事。**

| | 默认主会话(你对话的 Claude) | Subagent | Teammate(代理团队) |
|---|---|---|---|
| 你和它的关系 | **你直接对话的就是它** | 主会话派生的一次性下属 | 对等同事 |
| 上下文 | 完整、连续(整段历史) | **全新独立、用完即弃** | 各自持续 |
| 通信 | — | **只向上回传摘要** | **彼此能直接通信** |
| 工具/模型 | 会话全量配置 | 可裁剪(只读 / 换便宜模型) | 可继承 subagent 定义 |
| 适合 | 你本人主导 | 派去干一件具体活 | 组队长期并行协作 |

```mermaid
flowchart TD
    You["🧑 默认主会话<br/>(你对话的 Claude,记得全部上下文)"]
    You -->|派一次性下属| SA["🤖 Subagent<br/>干净上下文 · 干完交摘要就走"]
    You -->|组对等小队| TM["👥 Teammate ×N<br/>各有持续上下文 · 彼此能直接通信"]
    SA -.只回传摘要.-> You
    TM <-->|P2P 互相沟通| TM2["👥 其他 Teammate"]
    TM2 -.汇报.-> You

    style You fill:#fff3c4
    style SA fill:#cfe8ff
    style TM fill:#ffe7cf
    style TM2 fill:#ffe7cf
```

> 💡 **调用速查(三选一):**
> ① 自然语言委托:`用 code-reviewer 这个 subagent 审一下改动`(Claude 按 `description` 自动判断)
> ② @点名(保证运行):`@agent-code-reviewer 看看 auth 模块`
> ③ 整个会话都用:`claude --agent code-reviewer` 或 settings.json 写 `{ "agent": "code-reviewer" }`
> 管理用 `/agents`;想后台跑就说「在后台运行」或按 `Ctrl+B`。

### 1.1 它是什么 / 为什么用

Subagent = 一个**带有独立上下文、独立工具集、独立系统提示**的专用 AI worker。
主要价值:

- **Preserve context(保护上下文)**:把"探索/搜索"和"实现"分开,噪音不污染主对话
- **Enforce constraints(约束)**:限制它能用的工具(如只读)
- **Reuse(复用)**:用户级 subagent 可跨所有项目
- **Specialize(专业化)**:领域专用系统提示
- **Control costs(控本)**:把简单任务路由到更快/更便宜的模型(如 Haiku)

### 1.2 配置文件格式

YAML frontmatter + Markdown 正文:

```markdown
---
name: code-reviewer              # 必需,小写+连字符,唯一标识
description: Reviews code for quality and best practices   # 必需,Claude 据此决定何时委托
tools: Read, Glob, Grep          # 可选,允许列表;省略则继承全部工具
model: sonnet                    # 可选: sonnet/opus/haiku/fable/完整ID/inherit(默认)
---

You are a code reviewer. When invoked, analyze the code and provide
specific, actionable feedback on quality, security, and best practices.
```

**常用 frontmatter 字段速查:**

| 字段 | 必需 | 作用 |
|------|:---:|------|
| `name` | ✅ | 唯一标识(小写+连字符) |
| `description` | ✅ | Claude 何时委托给它 |
| `tools` | | 工具允许列表(省略=继承全部) |
| `disallowedTools` | | 工具拒绝列表 |
| `model` | | `sonnet`/`opus`/`haiku`/`fable`/`inherit` |
| `permissionMode` | | `default`/`acceptEdits`/`auto`/`dontAsk`/`bypassPermissions`/`plan` |
| `maxTurns` | | 最大代理轮数 |
| `skills` | | 启动时预加载的技能 |
| `memory` | | 持久内存作用域 `user`/`project`/`local` |
| `background` | | `true` = 作为后台任务运行 |
| `isolation` | | `worktree` = 在隔离的 git worktree 中运行 |
| `effort` | | `low`/`medium`/`high`/`xhigh`/`max` |
| `color` | | 任务列表中的显示颜色 |

### 1.3 存放位置与优先级

```mermaid
flowchart TD
    subgraph 优先级从高到低
    A["1️⃣ Managed settings<br/>(组织级,最高)"]
    B["2️⃣ --agents CLI flag<br/>(仅当前会话,JSON)"]
    C["3️⃣ .claude/agents/<br/>(项目级,可入版本控制供团队共享)"]
    D["4️⃣ ~/.claude/agents/<br/>(用户级,跨所有项目)"]
    E["5️⃣ Plugin 的 agents/<br/>(最低)"]
    end
    A --> B --> C --> D --> E
    F["⚠️ 同名时:<br/>优先级最高的定义生效"] -.-> A

    style A fill:#ff9b9b
    style C fill:#cfe8ff
    style D fill:#d8f5d0
```

> 两个作用域都会**递归扫描**,支持子文件夹(如 `agents/review/`),但身份只由 `name` 决定。

### 1.4 创建 → 调用 → 执行 全流程

```mermaid
flowchart TD
    Start([需要一个专用 worker]) --> Create{如何创建?}

    Create -->|交互式,推荐| C1["/agents 命令<br/>填 name/description/tools/model/prompt<br/>✅ 立即生效"]
    Create -->|手动| C2["在 .claude/agents/ 或<br/>~/.claude/agents/ 写 .md 文件<br/>⚠️ 需重启会话生效"]
    Create -->|临时| C3["claude --agents '{JSON}'<br/>仅本会话,不落盘"]

    C1 & C2 & C3 --> Invoke{如何调用?}

    Invoke -->|自动委托| I1["自然语言:<br/>'Use the code-reviewer subagent...'"]
    Invoke -->|保证运行| I2["@-mention:<br/>@agent-code-reviewer ..."]
    Invoke -->|整个会话| I3["claude --agent code-reviewer<br/>或 settings.json 设 agent 字段"]

    I1 & I2 & I3 --> Launch[启动:获得全新上下文窗口]

    Launch --> Ctx["加载:系统提示 + CLAUDE.md<br/>+ git 状态 + 预加载技能<br/>+ Claude 写的委托消息"]
    Ctx --> Exec["执行:独立权限/工具/模型<br/>从主对话的工作目录开始"]
    Exec --> Ret["仅顶级 subagent 的<br/>摘要返回主对话"]
    Ret --> End([完成])

    style C1 fill:#d8f5d0
    style I2 fill:#cfe8ff
    style Launch fill:#fff3c4
```

### 1.5 前台 vs 后台 vs 嵌套

```mermaid
flowchart LR
    subgraph 前台默认
    F["阻塞主对话<br/>权限提示立即显示"]
    end
    subgraph 后台
    B["并发运行,用户继续工作<br/>权限提示在主会话显示<br/>触发: '后台运行' / Ctrl+B"]

```

### 1.6 示例:只读代码审查员

```markdown
---
name: code-reviewer
description: Expert code review specialist. Proactively reviews code for quality, security, and maintainability.
tools: Read, Grep, Glob, Bash
model: inherit
---

You are a senior code reviewer ensuring high standards of code quality and security.

When invoked:
1. Run git diff to see recent changes
2. Focus on modified files
3. Begin review immediately

Review checklist:
- Code is clear and readable
- No duplicated code / proper error handling
- No exposed secrets / input validation implemented
```

## 2. Agent View(代理视图)

### 2.1 它是什么

一个统一的**终端界面**,用来管理多个 Claude Code **后台会话**:同时监控多个独立任务(修 bug、审 PR、查测试),整体掌握状态,**仅在需要时介入**。

特点:后台会话持续运行(无需终端常开)、worktree 隔离、可恢复(resume)、每个会话**独立消耗配额**。

### 2.2 架构:Supervisor 托管模型

```mermaid
flowchart TD

## 3. 运行代理团队(Agent Teams)

### 3.1 它是什么 / 与 Subagent 的本质区别

一个主会话当**队长(Team Lead)**,协调若干独立的**队员会话(Teammates)**。
**关键差异**:Agent Teams 的队员之间可以**直接互相沟通**,不只是向队长汇报。

> 实验性功能,需在 **Claude Code 的 `settings.json`** 里开启 —— 用户级 `~/.claude/settings.json`(所有项目生效)或项目级 `.claude/settings.json`(仅本项目),加入:
> ```json
> { "env": { "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS": "1" } }
> ```
> 等价写法:在 shell 里 `export CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` 后再启动 `claude`(仅当前 shell 生效)。

> 💡 **召唤与交互速查:**
> ① 开开关(上面那行写进 settings.json 或 `export CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1`)
> ② 自然语言组队:`Spawn 3 teammates to review PR #142:一个看安全、一个看性能、一个验证测试`
> ③ 让队员套用某 subagent 定义:`Spawn a teammate using the security-reviewer agent type to ...`
> ④ 交互(默认 in-process):`↑/↓` 选队员 · `Enter` 进入看输出/发消息 · `Esc` 中止 · `x` 关闭 · `Ctrl+T` 切任务清单
> ⑤ 关掉某队员:`让 researcher 这个队员关闭`

## 4. 动态工作流(Dynamic Workflows)

### 4.1 它是什么

一段由 **Claude 为你的任务现写的 JavaScript 脚本**,交给运行时在**后台隔离环境**执行。中间结果存在**脚本变量**里(而非塞进 Claude 上下文),因此能编排**几十到几百个 agent**。

**核心差异**:Subagents/Skills 是 Claude 逐轮决定下一步;**Workflows 是脚本决定流程**,Claude 只当"执行者"。

> 前置:Claude Code v2.1.154+、付费计划、已启用 API/Bedrock/Vertex/Foundry;在 `/config` 启用。

### 4.2 执行模型

    P["跟踪脚本进度"]

    L["约束:<br/>≤16 并发 agent<br/>≤1000 agent/run<br/>无中途用户输入"]
    end

    RT --> Agents["生成 N 个 agent 执行任务"]
    Agents --> Report["带源引用的报告 → 返回会话"]

```

flowchart TD
    T([用户触发]) --> Gen{内置工作流?}
    Gen -->|否| Write["Claude 分析任务<br/>设计多个 phase<br/>编写 JS 脚本"]

### 4.5 典型脚本骨架(Claude 自动生成)

```javascript
// 每个 workflow 脚本以 meta 开头(纯字面量)
export const meta = {
  name: 'investigate-and-verify',
  description: '调查一批目标,再交叉验证',
  phases: [{ title: '调查' }, { title: '验证' }],
};

// Phase 1: 初始调查 —— parallel 并发扇出,结果存脚本变量(不进 Claude 上下文)
phase('调查');
const results = await parallel(
  targets.map(t => () => agent(`Investigate ${t}...`))
);

// Phase 2: 交叉验证 —— 对每条结论再派一个 agent
phase('验证');
const verified = [];
for (const claim of results.filter(Boolean)) {
  const v = await agent(`Cross-check: ${claim}. 返回 REAL 或 FALSE`);
  if (v.includes('REAL')) verified.push(claim);
}

// 返回值回到会话
return { verified };
```

> 核心编排原语:`agent()`(派单个 agent)、`parallel()`(并发一批、栅栏等齐)、`pipeline()`(流水线,各 item 独立穿过所有 stage、无栅栏)、`phase()`/`log()`(分组与进度)。

    B --> C["每个 phase 显示:<br/>agent 数 / token 总量 / 耗时"]
    C --> D["→ 钻入 phase → 钻入 agent<br/>看 prompt / 最近工具调用 / 结果"]
    D --> E["控制键:<br/>p 暂停/恢复 · x 停止 · r 重启 agent<br/>f 过滤 · s 保存脚本为命令"]
    style E fill:#cfe8ff
```

    B -->|项目共享| C[".claude/workflows/"]
    B -->|个人全局| D["~/.claude/workflows/"]
    C & D --> E["以后用 /&lt;workflow-name&gt; 运行"]

### 4.8 约束与成本

| 约束 | 原因 |
|------|------|
| 无中途用户输入 | 只有权限提示能暂停;需签字权就分阶段跑 |
| 脚本无文件系统/shell | agent 负责读写/跑命令,脚本只负责编排 |
| ≤16 并发 agent | 限制本地资源 |
| ≤1000 agent/run | 防止失控循环 |

- 可恢复性:**同一会话内**暂停后恢复(完成的 agent 走缓存);**跨会话不可恢复**。
- 脚本落盘在 `~/.claude/projects/{session-id}/`,可读取/diff/编辑后重启。
- 关闭功能:`settings.json` 设 `"disableWorkflows": true` 或环境变量 `CLAUDE_CODE_DISABLE_WORKFLOWS=1`。
- 控本建议:先在**一个目录**而非整个仓库小规模试跑;`/workflows` 显示每个 agent 的 token 用量;可随时停止而不丢已完成工作。

## 5. 使用 Worktrees 隔离会话

### 5.1 什么是 / 为什么

**Git worktree** = 一个独立工作目录,有自己的文件和分支,但**与主检出共享同一仓库历史和远程**。
**目的**:多个 Claude Code 会话各在独立 worktree 工作,代码编辑**互不碰撞** —— 一个终端建功能,另一个修 bug,完全隔离。它是前面 Agent View / Teams / Workflows 并行的**底层基建**。

```mermaid
flowchart TD
    Repo[(共享仓库历史 + 远程 origin)]
    Repo --> Main["主检出<br/>(main 分支)"]
    Repo --> W1[".claude/worktrees/feature-auth<br/>分支 worktree-feature-auth"]
    Repo --> W2[".claude/worktrees/bugfix-123<br/>分支 worktree-bugfix-123"]
    Main -.->|独立文件| S0["会话 0"]
    W1 -.->|独立文件| S1["会话 1 建功能"]
    W2 -.->|独立文件| S2["会话 2 修 bug"]
    style Repo fill:#e8e8e8
    style W1 fill:#cfe8ff
    style W2 fill:#ffe7cf
```

flowchart TD
    End([会话结束]) --> Q{有未提交更改/<br/>未跟踪文件/新提交?}
    Q -->|无| Auto["✅ 自动删除 worktree 和分支"]

### 5.5 必备配置与最佳实践

**① `.worktreeinclude` —— 自动带上 gitignored 的本地文件**

worktree 是全新检出,`.env` 等不会自动出现。在项目根建 `.worktreeinclude`(用 `.gitignore` 语法):

```text
.env
.env.local
config/secrets.json
```
> 规则:只有**同时匹配模式 AND 被 gitignore** 的文件才复制;被跟踪的文件永不复制。

**② 把 worktree 目录排除出主检出**
```bash
echo ".claude/worktrees/" >> .gitignore
```

**③ 子代理隔离** —— frontmatter 里写 `isolation: worktree`,子代理在自己的 worktree 跑,完成且无改动则自动删。

**④ 基础分支** —— 默认从 `origin/HEAD`(fresh);要从本地 HEAD:
```json
{ "worktree": { "baseRef": "head" } }
```

**⑤ 新 worktree 要重装依赖** —— `npm install` / `pip install` 等需在每个新 worktree 重跑。

### 6.1 算法工程师 / ML Engineer 视角

**日常**:数据探索 → 特征工程 → 训练 → 评估 → 调参 → 跑 ablation → 复现 paper。
**痛点**:实验多、训练久、改代码容易互相覆盖、日志/数据把主对话上下文撑爆。

**机制映射:**

| 需求 | 用什么 | 怎么做 |
|------|--------|--------|
| 只读分析数据集/日志,不污染主线 | **Subagent** | `data-explorer`(`tools: Read,Bash,Grep`,`model: haiku` 省钱) |
| 几十上百组超参/特征扫描 | **Dynamic Workflow** | 每组一个 agent,≤16 并发,汇总 leaderboard |
| 多人并行做不同实验方向 | **Agent Teams** | 队员各管:数据增强 / 架构 / 损失函数,互相对比 |
| 每个实验代码隔离不互相覆盖 | **Worktrees** | `isolation: worktree`,一实验一分支 |
| 盯多个长跑训练 | **Agent View** | `claude agents`,完成/失败一目了然 |
| 复现论文 | **Subagent** | `paper-reader`(WebFetch)+ repro agent |

**端到端:一次「把模型 AUC 从 0.82 提到 0.85」的调参实验**

```mermaid

    WF --> P1["Phase 1 发现<br/>列出 5 组特征集 × 超参组合"]
    P1 --> P2["Phase 2 并行实验<br/>每个 agent 在独立 worktree<br/>train + eval(≤16 并发)"]
    P2 --> P3["Phase 3 汇总<br/>按 AUC 排序成 leaderboard"]
    P3 --> P4["Phase 4 验证<br/>对 Top 3 跑 5-fold 交叉验证"]

    Pick -->|满意| Merge["合并该 worktree 分支 → 收工 ✅"]
    Pick -->|还差点| WF

    style Goal fill:#fff3c4
    style P2 fill:#cfe8ff

```

**示例 ① 只读数据探索 subagent**(`.claude/agents/data-explorer.md`)

缺失率/目标分布/明显异常,并给出特征工程建议。绝不修改数据或代码。
```

**示例 ② 一句话触发网格搜索工作流**

```text

各训练 LightGBM 并在验证集报 AUC,汇总成 leaderboard,Top3 再跑 5-fold 验证
```

### 6.2 量化策略 / 托管交易系统开发者 视角

> ⚠️ **重要前提**:这里讲的是用 Claude Code **开发与回测交易系统的软件工程**,**不是投资建议**。
> - 实盘下单必须**人工把关**(plan 模式 + 风控 Hook),Claude 不应在无人审批下自动下真实订单;
> - **回测表现 ≠ 实盘收益**,警惕过拟合;市场有风险,盈亏自负。

**日常**:抓数据 → 写策略 → 回测 → 参数寻优 → 风控 → 模拟盘 → (人工把关下)实盘监控。

**机制映射:**

| 需求 | 用什么 | 怎么做 |
|------|--------|--------|
| 只读历史回测,绝不碰实盘 | **Subagent** | `backtest-runner`(工具限只读 + 回测引擎) |
| 一个策略扫几百组参数(止损/仓位/周期) | **Dynamic Workflow** | 扇出回测,汇总夏普/最大回撤/胜率 |
| 并行开发多种策略 | **Agent Teams** | 队员各做动量/均值回归/套利,互相 code review |
| 每个策略分支隔离 | **Worktrees** | 一策略一 worktree |
| 盯多个回测/数据管道 | **Agent View** | `claude agents` |
| **实盘下单红线** | **permissionMode: plan + Hook** | 真实下单先出计划审批,风控 hook 拦截 |

**端到端:策略从开发到上线,带三道安全闸**

```mermaid
flowchart TD
    subgraph DEV["① 开发 + 回测 —— 安全区(只读/沙箱)"]
    direction TB
    A["Agent Teams:多策略并行开发"] --> B["backtest-runner subagent<br/>历史数据回测"]
    B --> C["Dynamic Workflow 参数寻优<br/>几百组回测 → 夏普/回撤/胜率 leaderboard"]
    C --> D["walk-forward / 样本外验证"]
    end

    D --> Gate1{"🔍 人工评审<br/>过拟合? 风险可控?"}
    Gate1 -->|否| A
    Gate1 -->|是| PAPER["② 模拟盘 paper trading<br/>(纸面验证,不动真钱)"]
    PAPER --> Gate2{"📊 模拟盘达标?"}
    Gate2 -->|否| A

    Gate2 -->|是| LIVE
    subgraph LIVE["③ 实盘 —— 高风险,人工把关"]
    direction TB
    R1["permissionMode: plan<br/>下单前必须先出计划"] --> R2["风控 Hook 拦截:<br/>超仓位/超回撤/异常价 → 阻止"]
    R2 --> R3["✋ 人工审批每笔 / 每日额度"]
    end

    style DEV fill:#eef7ff
    style LIVE fill:#fff0f0
    style Gate1 fill:#fff3c4
    style Gate2 fill:#fff3c4
    style R3 fill:#ffd0d0
```

**示例 ① 只读回测 subagent**(`.claude/agents/backtest-runner.md`)

```markdown
---
name: backtest-runner
description: 只读历史数据回测策略,输出绩效指标,绝不触碰实盘接口
tools: Read, Bash, Glob
permissionMode: plan
---
你是回测工程师。只在历史数据上回测,输出年化/夏普/最大回撤/胜率/换手率。
严禁调用任何下单或交易 API。一旦发现策略代码调用实盘接口,立即停止并报告。
```

**示例 ② 风控闸 —— 用 Hook 拦截实盘下单**(`.claude/settings.json` 概念示例)

```json
{
  "hooks": {
    "PreToolUse": [
      { "matcher": "Bash",
        "hooks": [{ "type": "command", "command": "./scripts/block-live-orders.sh" }] }
    ]
  }
}
```

> `block-live-orders.sh` 检测命令里是否含 `place_order` / `submit` / `live` 等关键字,
> 命中则返回码 `2` 拦截并提示「实盘下单需人工执行」。

**示例 ③ 多策略并行开发(Agent Teams)**

```text
Spawn 3 teammates to develop and backtest three strategies in parallel:
- 动量(momentum)  - 均值回归(mean-reversion)  - 跨市场套利(arbitrage)
每人在自己的 worktree 开发,回测完互相 review 对方的过拟合风险,汇总到 findings 文档。
```

</script>

<script>
(function(){
  const raw = document.getElementById('md-source').textContent;
  const content = document.getElementById('content');

  // 1) markdown -> html
  content.innerHTML = marked.parse(raw);

  // 去掉与 hero 标题重复的第一个 h1
  const firstH1 = content.querySelector('h1');
  if (firstH1) firstH1.remove();

  // 按开头 emoji 给引用块上色(⚠️ 警告 / 💡 提示)
  content.querySelectorAll('blockquote').forEach(bq => {
    const t = bq.textContent.trim();
    if (t.startsWith('⚠️') || t.startsWith('注意')) bq.classList.add('cb-warn');
    else if (t.startsWith('💡')) bq.classList.add('cb-tip');
  });

  // 2) ```mermaid 代码块 -> 卡片包裹的 <pre class="mermaid">,源码留存供重渲染
  content.querySelectorAll('code.language-mermaid').forEach(code => {
    const card = document.createElement('div');
    card.className = 'diagram';
    const hint = document.createElement('span');
    hint.className = 'zoom-hint';
    hint.textContent = '🔍 点击放大';
    const pre = document.createElement('pre');
    pre.className = 'mermaid';
    pre.dataset.src = code.textContent;
    pre.textContent = code.textContent;
    card.appendChild(hint);
    card.appendChild(pre);
    code.closest('pre').replaceWith(card);
  });

  // 3) 锚点 + 侧栏目录
  const toc = document.getElementById('toc');
  let n = 0;
  content.querySelectorAll('h2, h3').forEach(h => {
    const id = 'sec-' + (n++);
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent.replace(/\s+/g,' ').trim();
    if (h.tagName === 'H3') a.className = 'lvl3';
    toc.appendChild(a);
  });

  // 4) mermaid 渲染
  function renderMermaid(theme){
    document.querySelectorAll('pre.mermaid').forEach(pre => {
      pre.removeAttribute('data-processed');
      pre.innerHTML = pre.dataset.src;
    });
    mermaid.initialize({
      startOnLoad:false, theme:theme, securityLevel:'loose',
      flowchart:{ htmlLabels:true, curve:'basis', useMaxWidth:true, padding:22, nodeSpacing:55, rankSpacing:60 },
      themeVariables:{ fontFamily:'"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",-apple-system,sans-serif' }
    });
    return mermaid.run({ querySelector:'pre.mermaid' })
      .then(bindZoom)
      .catch(e => console.error('mermaid error', e));
  }

  // 5) 点击放大
  const lb = document.getElementById('lightbox');
  const lbBox = lb.querySelector('.box');
  function bindZoom(){
    document.querySelectorAll('.diagram pre.mermaid').forEach(pre => {
      pre.onclick = () => {
        const svg = pre.querySelector('svg');
        if(!svg) return;
        lbBox.innerHTML = '';
        lbBox.appendChild(svg.cloneNode(true));
        lb.classList.add('show');
      };
    });
  }
  lb.addEventListener('click', () => lb.classList.remove('show'));
  document.addEventListener('keydown', e => { if(e.key==='Escape') lb.classList.remove('show'); });

  // 6) 主题切换
  const btn = document.getElementById('themeBtn');
  function applyTheme(dark){
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    btn.textContent = dark ? '☀️ 亮色' : '🌙 暗色';
    localStorage.setItem('cc-guide-dark', dark ? '1' : '0');
    renderMermaid(dark ? 'dark' : 'default');
  }
  btn.addEventListener('click', () =>
    applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark'));
  const hash = location.hash;
  applyTheme(hash==='#dark' ? true : hash==='#light' ? false : localStorage.getItem('cc-guide-dark')==='1');

  // 7) 目录高亮 + 进度条
  const links = [...toc.querySelectorAll('a')];
  const headings = [...content.querySelectorAll('h2, h3')];
  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if(en.isIntersecting){
        const i = headings.indexOf(en.target);
        links.forEach(l => l.classList.remove('active'));
        if(links[i]){ links[i].classList.add('active');
          links[i].scrollIntoView({block:'nearest'}); }
      }
    });
  }, { rootMargin:'0px 0px -78% 0px' });
  headings.forEach(h => obs.observe(h));

  const prog = document.getElementById('progress');
  const toTop = document.getElementById('toTop');
  toTop.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
  window.addEventListener('scroll', () => {
    const st = document.documentElement.scrollTop || document.body.scrollTop;
    const sh = (document.documentElement.scrollHeight||document.body.scrollHeight) - window.innerHeight;
    prog.style.width = (sh>0 ? (st/sh*100) : 0) + '%';
    toTop.classList.toggle('show', st > 600);
  });
})();
</script>
